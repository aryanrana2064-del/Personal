<!DOCTYPE html>
<html>
<head>
    <title>Work Tracker PRO</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            margin: 10px;
        }

        input, select, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        table {
            width: 95%;
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #555;
        }
    </style>
</head>

<body>

<h1>☁️ Work Tracker PRO</h1>

<div class="card">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
</div>

<h3 id="userEmail"></h3>

<div class="card">
    <input type="text" id="personName" placeholder="Person Name">
    <input type="number" id="salary" placeholder="₹ per work">
    <button onclick="addPerson()">➕ Add Person</button>
</div>

<select id="personSelect"></select>

<br>

<button onclick="addWork()">+ Work</button>
<button onclick="addLeave()">Leave</button>

<h2 id="total">₹0</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>₹</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
// ✅ YOUR SUPABASE KEYS
const SUPABASE_URL = "https://kmgnfgngtzxlxyjzboqg.supabase.co";
const SUPABASE_KEY = "sb_publishable_1eqT_P96Ee8DNfZL4zduvg_Nwr11o1s";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let data = [];
let persons = [];

// 🔐 AUTH
async function signup(){
    let email = prompt("Enter Email");
    let pass = prompt("Enter Password");

    let { error } = await supabaseClient.auth.signUp({
        email: email,
        password: pass
    });

    alert(error ? error.message : "Signup Success");
}

async function login(){
    let email = prompt("Enter Email");
    let pass = prompt("Enter Password");

    let { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: pass
    });

    if(!error){
        currentUser = data.user.email;
        document.getElementById("userEmail").innerText = "User: " + currentUser;
        loadData();
    } else {
        alert(error.message);
    }
}

async function logout(){
    await supabaseClient.auth.signOut();
    location.reload();
}

// ☁️ LOAD DATA
async function loadData(){
    let { data: result } = await supabaseClient
        .from("work")
        .select("*")
        .eq("user", currentUser);

    data = result || [];
    renderData();
}

// ➕ PERSON
function addPerson(){
    let name = document.getElementById("personName").value;
    let salary = parseInt(document.getElementById("salary").value) || 200;

    if(name){
        persons.push({name, salary});
        renderPersons();
    }
}

function renderPersons(){
    let html = "";
    persons.forEach(p=>{
        html += `<option>${p.name}</option>`;
    });
    document.getElementById("personSelect").innerHTML = html;
}

function getSalary(name){
    let p = persons.find(x=>x.name === name);
    return p ? p.salary : 200;
}

// ➕ WORK
async function addWork(){
    let now = new Date();
    let name = document.getElementById("personSelect").value;

    let entry = {
        user: currentUser,
        name: name,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        status: "Work",
        earning: getSalary(name)
    };

    await supabaseClient.from("work").insert([entry]);
    loadData();
}

// ➕ LEAVE
async function addLeave(){
    let now = new Date();
    let name = document.getElementById("personSelect").value;

    let entry = {
        user: currentUser,
        name: name,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        status: "Leave",
        earning: 0
    };

    await supabaseClient.from("work").insert([entry]);
    loadData();
}

// 📊 RENDER
function renderData(){
    let html = "";
    let total = 0;

    data.forEach(d=>{
        total += d.earning;

        html += `
        <tr>
            <td>${d.name}</td>
            <td>${d.date}</td>
            <td>${d.time}</td>
            <td>${d.status}</td>
            <td>₹${d.earning}</td>
        </tr>`;
    });

    document.getElementById("data").innerHTML = html;
    document.getElementById("total").innerText = "₹" + total;
}
</script>

</body>
</html>
